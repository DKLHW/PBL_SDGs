<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>단국대 학식</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1b2a4a;
      --navy-dark: #111e36;
      --navy-mid: #243459;
      --navy-light: #2e4275;
      --accent: #4a7fd4;
      --accent-bright: #5b8fe8;
      --bg: #f0f2f7;
      --surface: #ffffff;
      --border: #d4d9e8;
      --text: #111827;
      --text-muted: #6b7280;
      --text-light: #9ca3af;
      --star-on: #f59e0b;
      --star-off: #d1d5db;
      --popular: #c8380a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

    header { background: var(--navy-dark); color: #fff; }
    .header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-logo { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #fff; padding: 4px; }
    .header-logo img { width: 100%; height: 100%; object-fit: contain; }
    .header-title { font-size: 16px; font-weight: 700; color: #fff; }
    .header-subtitle { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .header-date { font-size: 11px; color: rgba(255,255,255,0.4); text-align: right; line-height: 1.7; }

    .tab-wrapper { background: var(--navy); border-top: 1px solid rgba(255,255,255,0.07); }
    .tab-scroll { display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 10px; }
    .tab-scroll::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; padding: 11px 15px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.45); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
    .tab-btn:hover { color: rgba(255,255,255,0.8); }
    .tab-btn.active { color: #fff; border-bottom-color: var(--accent-bright); }

    main { max-width: 600px; margin: 0 auto; padding: 20px 16px 60px; }
    .restaurant-bar { background: var(--navy); color: #fff; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .r-icon { font-size: 22px; line-height: 1; }
    .r-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .r-type-badge { font-size: 10px; padding: 2px 8px; background: var(--accent); color: #fff; font-weight: 700; margin-left: auto; letter-spacing: 0.05em; }

    .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }

    .menu-card { background: var(--surface); border: 1px solid var(--border); margin-bottom: 12px; }
    .menu-card-header { display: flex; align-items: center; gap: 10px; padding: 13px 14px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; transition: background 0.1s; }
    .menu-card-header:hover { background: #f7f9fd; }
    .menu-card-header.open { background: #f0f4fc; }
    .menu-card-left { flex: 1; }
    .menu-card-name { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .popular-badge { display: inline-flex; align-items: center; gap: 3px; background: var(--popular); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; letter-spacing: 0.04em; }
    .menu-card-meta { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
    .menu-card-price { font-size: 14px; font-weight: 700; color: var(--navy); }
    .menu-mini-star { font-size: 12px; color: var(--star-off); }
    .menu-mini-star.on { color: var(--star-on); }
    .menu-avg-text { font-size: 11px; color: var(--text-muted); }
    .menu-review-count { font-size: 11px; color: var(--text-light); }
    .menu-chevron { font-size: 12px; color: var(--text-light); transition: transform 0.2s; }
    .menu-chevron.open { transform: rotate(180deg); }

    .review-panel { display: none; padding: 14px; border-top: 1px solid var(--border); background: #fafbfd; }
    .review-panel.open { display: block; }

    .review-stars-row { display: flex; align-items: center; gap: 3px; margin-bottom: 10px; }
    .r-star { font-size: 28px; cursor: pointer; color: var(--star-off); transition: transform 0.1s, color 0.1s; user-select: none; line-height: 1; }
    .r-star:hover { transform: scale(1.15); }
    .r-star.active { color: var(--star-on); }
    .r-star-label { font-size: 12px; color: var(--text-muted); margin-left: 8px; }

    .comment-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text); background: #fff; resize: none; outline: none; transition: border-color 0.15s; display: block; margin-bottom: 10px; }
    .comment-input:focus { border-color: var(--accent); }
    .review-submit-btn { padding: 9px 18px; background: var(--navy); color: #fff; border: none; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.03em; transition: background 0.15s; float: right; }
    .review-submit-btn:hover { background: var(--navy-light); }
    .clearfix::after { content: ''; display: table; clear: both; }

    .reviews-divider { clear: both; border-top: 1px solid var(--border); margin: 14px 0 10px; }
    .reviews-list-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .review-item { padding: 10px 0; border-bottom: 1px solid #edf0f7; }
    .review-item:last-child { border-bottom: none; }
    .review-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .review-item-star { font-size: 12px; color: var(--star-off); }
    .review-item-star.on { color: var(--star-on); }
    .review-item-score { font-size: 12px; font-weight: 700; color: var(--navy); }
    .review-item-time { font-size: 10px; color: var(--text-light); margin-left: auto; }
    .review-item-comment { font-size: 13px; color: var(--text); line-height: 1.6; }
    .no-reviews { font-size: 12px; color: var(--text-light); text-align: center; padding: 10px 0 4px; }

    .no-menu { background: var(--surface); border: 1px solid var(--border); padding: 36px 16px; text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 14px; }
    .no-menu .no-icon { font-size: 26px; display: block; margin-bottom: 8px; }

    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--navy-dark); color: #fff; padding: 10px 22px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity 0.22s, transform 0.22s; z-index: 999; white-space: nowrap; border-left: 3px solid var(--accent-bright); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    footer { text-align: center; padding: 16px; font-size: 11px; color: var(--text-light); }
  </style>
</head>

      <div>
        <div class="header-title">단국대 학식</div>
        <div class="header-subtitle">Dankook University Cafeteria</div>
      </div>
    </div>
    <div class="header-date" id="header-date"></div>
  </div>
  <div class="tab-wrapper">
    <div class="tab-scroll">
      <button class="tab-btn active" data-id="gwang"    onclick="selectTab('gwang')">광뚝</button>
      <button class="tab-btn"        data-id="jungshik" onclick="selectTab('jungshik')">중식대장</button>
      <button class="tab-btn"        data-id="bbokka"   onclick="selectTab('bbokka')">뽀까뽀까</button>
      <button class="tab-btn"        data-id="pokpung"  onclick="selectTab('pokpung')">폭풍분식</button>
      <button class="tab-btn"        data-id="guk51"    onclick="selectTab('guk51')">51장국밥</button>
      <button class="tab-btn"        data-id="gapjji"   onclick="selectTab('gapjji')">값찌개</button>
      <button class="tab-btn"        data-id="katsu"    onclick="selectTab('katsu')">경성카츠</button>
      <button class="tab-btn"        data-id="barbie"   onclick="selectTab('barbie')">바비든든</button>
      <button class="tab-btn"        data-id="bibigo"   onclick="selectTab('bibigo')">비비고고</button>
      <button class="tab-btn"        data-id="popo"     onclick="selectTab('popo')">포포420</button>
    </div>
  </div>
</header>

<main id="main-content"></main>
<footer>단국대학교 죽전캠퍼스 · 학식 정보 앱 프로토타입</footer>
<div id="toast"></div>

<script>
  const restaurants = {
    gwang:    { name: '광뚝',    icon: '🍖', type: '한식', menus: [
      { id: 'gwang_1', name: '고추장불고기', price: 6900, popular: false }
    ]},
    jungshik: { name: '중식대장', icon: '🍜', type: '중식', menus: [
      { id: 'jung_1',  name: '크림짬뽕',    price: 7900, popular: true  }
    ]},
    bbokka:   { name: '뽀까뽀까', icon: '🍱', type: '분식', menus: [] },
    pokpung:  { name: '폭풍분식', icon: '🌮', type: '분식', menus: [] },
    guk51:    { name: '51장국밥', icon: '🍲', type: '한식', menus: [] },
    gapjji:   { name: '값찌개',   icon: '🫕', type: '한식', menus: [] },
    katsu:    { name: '경성카츠', icon: '🍛', type: '일식', menus: [] },
    barbie:   { name: '바비든든', icon: '🥩', type: '양식', menus: [] },
    bibigo:   { name: '비비고고', icon: '🥗', type: '한식', menus: [] },
    popo:     { name: '포포420',  icon: '🌯', type: '퓨전', menus: [] },
  };

  const menuData = {};
  Object.values(restaurants).forEach(r =>
    r.menus.forEach(m => menuData[m.id] = { sel: 0, open: false, reviews: [] })
  );

  let current = 'gwang';

  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('header-date').innerHTML =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일<br>' + days[d.getDay()] + '요일';

  function avgOf(mid) {
    const rv = menuData[mid].reviews;
    if (!rv.length) return null;
    return rv.reduce((a,b)=>a+b.score,0)/rv.length;
  }

  function renderMenuCard(rid, m) {
    const md = menuData[m.id];
    const avg = avgOf(m.id);
    const cnt = md.reviews.length;
    const isOpen = md.open;

    const popularHTML = m.popular ? '<span class="popular-badge">🔥 인기</span>' : '';
    const miniStars = Array.from({length:5},(_,i)=>
      '<span class="menu-mini-star'+(avg!==null&&i<Math.round(avg)?' on':'')+'">★</span>').join('');
    const metaHTML = avg !== null
      ? '<span style="display:flex;gap:1px">'+miniStars+'</span><span class="menu-avg-text">'+avg.toFixed(1)+'점</span><span class="menu-review-count">('+cnt+'개 리뷰)</span>'
      : '<span class="menu-review-count">아직 리뷰 없음</span>';

    const starsInput = Array.from({length:5},(_,i)=>
      '<span class="r-star'+(md.sel>i?' active':'')+'" onclick="clickMenuStar(\''+m.id+'\','+( i+1)+')">★</span>').join('');

    let reviewsHTML = '';
    if (md.reviews.length > 0) {
      reviewsHTML = '<div class="reviews-divider"></div><div class="reviews-list-label">리뷰 ('+md.reviews.length+')</div>'+
        md.reviews.slice().reverse().map(rv =>
          '<div class="review-item"><div class="review-item-header">'+
          '<span style="display:flex;gap:1px">'+Array.from({length:5},(_,i)=>'<span class="review-item-star'+(i<rv.score?' on':'')+'">★</span>').join('')+'</span>'+
          '<span class="review-item-score">'+rv.score+'점</span>'+
          '<span class="review-item-time">'+rv.time+'</span></div>'+
          (rv.comment ? '<div class="review-item-comment">'+rv.comment+'</div>' : '')+
          '</div>').join('');
    } else {
      reviewsHTML = '<div class="reviews-divider"></div><div class="no-reviews">첫 번째 리뷰를 남겨보세요!</div>';
    }

    return '<div class="menu-card" id="card-'+m.id+'">'+
      '<div class="menu-card-header'+(isOpen?' open':'')+'" onclick="toggleMenu(\''+rid+'\',\''+m.id+'\')">'+
        '<div class="menu-card-left">'+
          '<div class="menu-card-name">'+m.name+' '+popularHTML+'</div>'+
          '<div class="menu-card-meta"><span class="menu-card-price">'+m.price.toLocaleString()+'원</span>'+metaHTML+'</div>'+
        '</div>'+
        '<span class="menu-chevron'+(isOpen?' open':'')+'">▼</span>'+
      '</div>'+
      '<div class="review-panel'+(isOpen?' open':'')+'" id="panel-'+m.id+'">'+
        '<div class="review-stars-row">'+starsInput+
          '<span class="r-star-label">'+(md.sel ? md.sel+'점 선택됨' : '별점 선택')+'</span>'+
        '</div>'+
        '<textarea class="comment-input" id="comment-'+m.id+'" rows="2" placeholder="한 줄 코멘트를 남겨주세요 (선택사항)"></textarea>'+
        '<div class="clearfix"><button class="review-submit-btn" onclick="submitMenuReview(\''+rid+'\',\''+m.id+'\')">리뷰 등록</button></div>'+
        reviewsHTML+
      '</div>'+
    '</div>';
  }

  function render(rid) {
    const r = restaurants[rid];
    const bodyHTML = r.menus.length === 0
      ? '<div class="no-menu"><span class="no-icon">📋</span>메뉴 정보가 아직 없습니다</div>'
      : r.menus.map(m => renderMenuCard(rid, m)).join('');

    document.getElementById('main-content').innerHTML =
      '<div class="restaurant-bar">'+
        '<span class="r-icon">'+r.icon+'</span>'+
        '<span class="r-name">'+r.name+'</span>'+
        '<span class="r-type-badge">'+r.type+'</span>'+
      '</div>'+
      '<div class="section-label">메뉴 · 리뷰</div>'+
      bodyHTML;
  }

  function toggleMenu(rid, mid) {
    menuData[mid].open = !menuData[mid].open;
    render(rid);
    if (menuData[mid].open) {
      setTimeout(() => {
        const el = document.getElementById('card-'+mid);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }
  }

  function clickMenuStar(mid, val) {
    menuData[mid].sel = val;
    const panel = document.getElementById('panel-'+mid);
    if (!panel) return;
    panel.querySelectorAll('.r-star').forEach((s,i) => s.classList.toggle('active', i < val));
    const lbl = panel.querySelector('.r-star-label');
    if (lbl) lbl.textContent = val+'점 선택됨';
  }

  function submitMenuReview(rid, mid) {
    const md = menuData[mid];
    if (!md.sel) { showToast('별점을 먼저 선택해 주세요!'); return; }
    const commentEl = document.getElementById('comment-'+mid);
    const comment = commentEl ? commentEl.value.trim() : '';
    const now = new Date();
    const time = (now.getMonth()+1)+'/'+now.getDate()+' '+
      String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    md.reviews.push({ score: md.sel, comment, time });
    const menuName = restaurants[rid].menus.find(m=>m.id===mid)?.name || '';
    showToast(menuName+' 리뷰 등록 완료!');
    md.sel = 0;
    render(rid);
  }

  function selectTab(id) {
    current = id;
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.id === id));
    render(id);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2400);
  }

  render('gwang');
</script>
</body>
</html>
